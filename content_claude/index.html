<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>30-Day Insurance AI Challenge — LinkedIn Content Pack</title>
  <style>
    :root {
      --bg: #0b1730;
      --surface: #131f3a;
      --card: #1a2744;
      --ink: #e2e8f0;
      --muted: #94a3b8;
      --accent: #0f766e;
      --accent-light: #14b8a6;
      --border: #2a3a5c;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: Inter, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
    }
    .header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .header .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }
    .header .accent { color: var(--accent-light); }
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat .num {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent-light);
    }
    .stat .label {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px 24px;
    }
    .filters button {
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .filters button:hover,
    .filters button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(15, 118, 110, 0.15);
    }
    .post-card .id-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .badge-series { background: var(--accent); color: #fff; }
    .badge-architecture { background: #3b82f6; color: #fff; }
    .badge-roadmap { background: #8b5cf6; color: #fff; }
    .badge-milestone { background: var(--amber); color: #000; }
    .badge-day-app { background: var(--green); color: #000; }
    .badge-section { background: #64748b; color: #fff; }
    .post-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .post-card .hook {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .post-card .tags {
      font-size: 0.8rem;
      color: var(--accent-light);
    }
    .post-card .order {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
    }
    .footer {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent-light); text-decoration: none; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 720px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }
    .modal .close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal h2 { margin-bottom: 16px; }
    .modal .content {
      white-space: pre-wrap;
      line-height: 1.7;
      color: var(--ink);
    }
    .modal .cta {
      margin-top: 16px;
      padding: 12px;
      background: var(--surface);
      border-radius: 12px;
      color: var(--accent-light);
      font-weight: 600;
    }
    .modal .hashtags {
      margin-top: 12px;
      color: var(--accent-light);
      font-size: 0.9rem;
    }
    .copy-btn {
      margin-top: 16px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .copy-btn:hover { background: var(--accent-light); }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 1.5rem; }
      .stats { gap: 16px; }
      .stat .num { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>30-Day Insurance AI Challenge</h1>
    <p class="subtitle">LinkedIn Content Pack by <span class="accent">Poovannan Rajendran</span></p>
    <p class="subtitle" style="margin-top:4px; font-size:0.9rem;">Built with Claude Code</p>
  </div>

  <div class="stats">
    <div class="stat"><div class="num">33</div><div class="label">Posts</div></div>
    <div class="stat"><div class="num">11</div><div class="label">Day Apps</div></div>
    <div class="stat"><div class="num">7</div><div class="label">Buckets</div></div>
    <div class="stat"><div class="num">14</div><div class="label">Section Posts</div></div>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="series">Series</button>
    <button data-filter="architecture">Architecture</button>
    <button data-filter="roadmap">Roadmap</button>
    <button data-filter="milestone">Milestone</button>
    <button data-filter="day-app">Day Apps</button>
    <button data-filter="section">Sections</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="close" onclick="closeModal()">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div class="footer">
    <p>Poovannan Rajendran &middot; <a href="https://www.poovi.me">poovi.me</a> &middot; <a href="https://github.com/poovannanrajendran">GitHub</a></p>
    <p style="margin-top:8px;">Product names, logos, and trademarks are the property of their respective owners.</p>
  </div>

  <script>
    let posts = [];
    let currentFilter = 'all';

    async function loadPosts() {
      const res = await fetch('posts.json');
      posts = await res.json();
      posts.sort((a, b) => (a.publishOrder || 99) - (b.publishOrder || 99));
      renderGrid();
    }

    function getBadgeClass(cat) {
      return 'badge-' + cat;
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const filtered = currentFilter === 'all' ? posts : posts.filter(p => p.category === currentFilter);
      grid.innerHTML = filtered.map(p => `
        <div class="post-card" onclick="openPost('${p.id}')">
          <span class="order">${p.publishOrder || '—'}</span>
          <span class="id-badge ${getBadgeClass(p.category)}">${p.id} &middot; ${p.category}</span>
          <h3>${p.title}</h3>
          <p class="hook">${p.hooks ? p.hooks.join(' ') : ''}</p>
          <div class="tags">${(p.hashtags || []).slice(0, 4).join(' ')}</div>
        </div>
      `).join('');
    }

    async function openPost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;

      let content = '';
      try {
        const res = await fetch('posts/' + post.file);
        if (res.ok) content = await res.text();
      } catch(e) {}

      // Strip markdown title
      content = content.replace(/^# .+\n\n?/, '');

      const mc = document.getElementById('modal-content');
      mc.innerHTML = `
        <span class="id-badge ${getBadgeClass(post.category)}" style="margin-bottom:12px;display:inline-block">${post.id} &middot; ${post.category}</span>
        <h2>${post.title}</h2>
        <div class="content">${content}</div>
        <button class="copy-btn" onclick="copyPost('${post.id}')">Copy Post Text</button>
      `;
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    async function copyPost(id) {
      const post = posts.find(p => p.id === id);
      if (!post) return;
      try {
        const res = await fetch('posts/' + post.file);
        let text = await res.text();
        text = text.replace(/^# .+\n\n?/, '');
        // Remove image prompt sections
        text = text.replace(/\*\*Image prompt.*$/ms, '');
        await navigator.clipboard.writeText(text.trim());
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Post Text', 2000);
      } catch(e) { alert('Copy failed — select text manually'); }
    }

    document.getElementById('modal').addEventListener('click', e => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderGrid();
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    loadPosts();
  </script>
</body>
</html>
